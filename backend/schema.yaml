  /api/auth/token/:
    post:
      operationId: auth_token_create
      summary: Dang nhap va nhan JWT token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainCompany'
            examples:
              LoginPayload:
                value:
                  username: admin
                  password: '123456'
                summary: Login payload
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainCompany'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainCompany'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web

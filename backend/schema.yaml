components:
  schemas:
    Centers:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 255
        email:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 255
        bank_code:
          type: string
          maxLength: 255
        bank_number:
          type: string
          maxLength: 255
        bank_owner:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        created_by_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        updated_by_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        address:
          type: string
          maxLength: 255
        contact_info:
          nullable: true
        bank_info:
          nullable: true
        synced_at:
          type: string
          format: date-time
          nullable: true
        center_director_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        center_manager_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        ver_sync:
          type: string
          nullable: true
          maxLength: 255
        bank_qr:
          type: string
          nullable: true
          maxLength: 255
        email_password:
          type: string
          nullable: true
